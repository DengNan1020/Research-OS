name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: npm run tauri:build -- --ci --target aarch64-apple-darwin

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        run: npm run tauri:build -- --ci --target x86_64-pc-windows-msvc --no-bundle

      - name: Package Windows portable zip
        shell: pwsh
        run: |
          $releaseDir = "src-tauri/target/x86_64-pc-windows-msvc/release"
          $stageDir = "src-tauri/target/windows-portable"
          $zipName = "Research-OS_${env:GITHUB_REF_NAME}_x64_windows.zip"

          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          Copy-Item "$releaseDir/*.exe" $stageDir -Force
          Copy-Item "$releaseDir/*.dll" $stageDir -Force

          if (Test-Path "$releaseDir/resources") {
            Copy-Item "$releaseDir/resources" -Destination $stageDir -Recurse -Force
          }

          Compress-Archive -Path "$stageDir/*" -DestinationPath "dist/$zipName" -Force

      - name: Upload Windows ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/*.zip
          if-no-files-found: error

  publish-release:
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Research OS ${{ github.ref_name }}
          body: Automatic release for Research OS.
          files: release-assets/**/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
